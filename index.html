<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM FAILURE // CRITICAL ERROR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            opacity: 0;
            transition: opacity 2s ease;
            position: absolute;
        }
        
        /* Екран критичної помилки */
        #error-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #0d0000; /* Темно-червоний відтінок жаху */
            padding: 30px;
            color: #ff3333;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            text-shadow: 0 0 10px #ff0000;
        }

        .glitch-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            animation: pulseError 1s infinite alternate;
        }

        .error-logs {
            max-width: 600px;
            text-align: left;
            font-size: 1rem;
            margin-bottom: 30px;
            color: #ff6666;
            opacity: 0.8;
        }

        @keyframes pulseError {
            0% { transform: scale(1); opacity: 0.9; text-shadow: 0 0 10px #ff0000; }
            100% { transform: scale(1.02); opacity: 1; text-shadow: 0 0 25px #ff0000, 0 0 5px #fff; }
        }

        /* Стильна червона кнопка аварійного перезапуску */
        #startBtn {
            display: none;
            padding: 18px 45px;
            font-family: sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ff3333;
            background: rgba(255, 0, 0, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid #ff3333;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            transition: all 0.3s ease;
            z-index: 30;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #startBtn:hover {
            transform: scale(1.05);
            color: #fff;
            background: #ff3333;
            box-shadow: 0 0 40px #ff0000;
        }
    </style>
</head>
<body>

    <div id="error-screen">
        <div class="glitch-title">⚠️ CRITICAL_SYSTEM_FAILURE ⚠️</div>
        <div class="error-logs" id="log-container">
            </div>
        <button id="startBtn">OVERRIDE SYSTEM</button>
    </div>

    <canvas id="heartCanvas"></canvas>

    <audio id="bgMusic" src="angel.mp3" loop></audio>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const errorScreen = document.getElementById('error-screen');
        const logContainer = document.getElementById('log-container');
        const audio = document.getElementById('bgMusic');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const stars = [];
        const textToDisplay = "love you";
        
        let audioCtx, analyser, dataArray;
        let beatScale = 1; 
        let bassPower = 0;

        const mouse = { x: null, y: null, radius: 75 };
        window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

        // Симуляція збою системи
        const errorLines = [
            "[ERROR] Memory leak detected at block 0x7FFF4A2C",
            "[WARNING] Core temperature exceeding emotional limits...",
            "[FATAL] Connection to rational_logic.dll severed.",
            "[ERROR] Security breach: Core infected by affection_virus.exe",
            "[INFO] Attempting to isolate infected sectors...",
            "[FATAL] Isolation FAILED. Virus rewriting main interface.",
            "[SYSTEM] Total collapse imminent. Only one backup module active.",
            "------------------------------------------------------------",
            "[READY] Emergency manual reboot available."
        ];

        let lineIndex = 0;
        function showErrors() {
            if (lineIndex < errorLines.length) {
                const p = document.createElement('p');
                p.textContent = errorLines[lineIndex];
                logContainer.appendChild(p);
                lineIndex++;
                setTimeout(showErrors, 350); // Швидкість випадіння помилок
            } else {
                setTimeout(() => {
                    startBtn.style.display = 'block';
                }, 400);
            }
        }

        window.onload = showErrors;

        // Код серця та частинок
        class Particle {
            constructor(x, y, text) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseX = x;
                this.baseY = y;
                this.text = text;
                this.density = (Math.random() * 18) + 12;
                this.fontSize = Math.random() * 3 + 9;
                this.h = Math.floor(Math.random() * 15) + 340; 
                this.s = Math.floor(Math.random() * 20) + 80;   
                this.l = Math.floor(Math.random() * 20) + 50;   
                this.alpha = (Math.random() * 0.4 + 0.5).toFixed(2);
            }

            draw() {
                let currentLight = Math.min(100, this.l + (bassPower * 25));
                ctx.fillStyle = `hsla(${this.h}, ${this.s}%, ${currentLight}%, ${this.alpha})`;
                ctx.font = `${this.fontSize * (beatScale * 0.97)}px Arial`;
                
                if (bassPower > 0.4) {
                    ctx.shadowBlur = 12 * bassPower;
                    ctx.shadowColor = `hsl(${this.h}, 100%, 60%)`;
                }
                ctx.fillText(this.text, this.x, this.y);
                ctx.shadowBlur = 0;
            }

            update(centerX, centerY) {
                let dxFromCenter = this.baseX - centerX;
                let dyFromCenter = this.baseY - centerY;
                let targetX = centerX + dxFromCenter * beatScale;
                let targetY = centerY + dyFromCenter * beatScale;

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius) {
                    let forceDirectionX = dx / distance;
                    let forceDirectionY = dy / distance;
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.x -= forceDirectionX * force * 16;
                    this.y -= forceDirectionY * force * 16;
                } else {
                    this.x -= (this.x - targetX) / this.density;
                    this.y -= (this.y - targetY) / this.density;
                }
            }
        }

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.2;
                this.baseAlpha = Math.random() * 0.4 + 0.1;
                this.alpha = this.baseAlpha;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * (1 + bassPower * 0.5), 0, Math.PI * 2);
                ctx.fill();
            }
            update() { this.alpha = Math.min(1, this.baseAlpha + bassPower * 0.4); }
        }

        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return { x: x * scale, y: -y * scale };
        }

        function init() {
            particles.length = 0;
            stars.length = 0;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) / 44; 

            for (let i = 0; i < 120; i++) stars.push(new Star());

            for (let t = 0; t < Math.PI * 2; t += 0.035) {
                let point = getHeartPoint(t, scale);
                particles.push(new Particle(centerX + point.x, centerY + point.y, textToDisplay));
                for (let j = 0; j < 2; j++) {
                    let r = Math.random();
                    let innerPoint = getHeartPoint(t, scale * r);
                    particles.push(new Particle(centerX + innerPoint.x, centerY + innerPoint.y, textToDisplay));
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.14)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                let bass = (dataArray[0] + dataArray[1] + dataArray[2]) / 3;
                bassPower = bass / 255; 
                beatScale = 1 + bassPower * 0.24; 
            }

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            for (let i = 0; i < stars.length; i++) {
                stars[i].update();
                stars[i].draw();
            }
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(centerX, centerY);
                particles[i].draw();
            }

            let textGlow = Math.floor(20 * bassPower);
            if (textGlow > 2) {
                ctx.shadowBlur = textGlow + 10;
                ctx.shadowColor = 'rgba(255, 44, 85, 0.8)';
            }
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${Math.floor(46 * beatScale)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Love you.', centerX, centerY);
            ctx.shadowBlur = 0; 

            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', () => {
            errorScreen.style.display = 'none';
            canvas.style.opacity = '1';
            document.body.style.background = "radial-gradient(circle at center, #11001c 0%, #05000d 60%, #000000 100%)";

            audio.play().catch(e => console.log("Audio play blocked:", e));

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let src = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            src.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64; 
            analyser.smoothingTimeConstant = 0.75; 
            
            let bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            init();
            animate();
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(audioCtx) init();
        });
    </script>
</body>
</html>
