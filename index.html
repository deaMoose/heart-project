<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Текстове Серце</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        .center-text {
            position: absolute;
            color: #fff;
            font-size: 3rem;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="center-text">Love you.</div>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const textToDisplay = "love you";
        
        const mouse = {
            x: null,
            y: null,
            radius: 60 // Радіус відштовхування
        };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor(x, y, text) {
                this.x = Math.random() * canvas.width; // Початкова випадкова позиція
                this.y = Math.random() * canvas.height;
                this.baseX = x; // Цільова позиція у формі серця
                this.baseY = y;
                this.text = text;
                this.density = (Math.random() * 30) + 15; // Швидкість повернення
                this.fontSize = Math.random() * 6 + 7; // Розмір тексту (7px - 13px)
                this.color = `rgba(255, ${Math.floor(Math.random() * 50)}, ${Math.floor(Math.random() * 100 + 50)}, ${Math.random() * 0.5 + 0.5})`;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.font = `${this.fontSize}px Arial`;
                ctx.fillText(this.text, this.x, this.y);
            }

            update() {
                // Перевірка взаємодії з мишкою
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                
                // Максимальна дистанція відштовхування
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                
                if (distance < mouse.radius) {
                    this.x -= forceDirectionX * force * 10;
                    this.y -= forceDirectionY * force * 10;
                } else {
                    // Повернення на базу
                    if (this.x !== this.baseX) {
                        let dxBase = this.x - this.baseX;
                        this.x -= dxBase / this.density;
                    }
                    if (this.y !== this.baseY) {
                        let dyBase = this.y - this.baseY;
                        this.y -= dyBase / this.density;
                    }
                }
            }
        }

        // Математична формула серця (параметричні рівняння)
        function getHeartPoint(t, scale) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return {
                x: x * scale,
                y: -y * scale // мінус, бо в canvas вісь Y йде вниз
            };
        }

        function init() {
            particles.length = 0;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Підбираємо масштаб залежно від екрану
            const scale = Math.min(canvas.width, canvas.height) / 45; 

            // Генеруємо точки вздовж контуру та всередині серця
            for (let t = 0; t < Math.PI * 2; t += 0.015) {
                // Контур серця
                let point = getHeartPoint(t, scale);
                particles.push(new Particle(centerX + point.x, centerY + point.y, textToDisplay));

                // Заповнення внутрішньої частини (випадкові точки всередині)
                for (let j = 0; j < 5; j++) {
                    let r = Math.random();
                    let innerPoint = getHeartPoint(t, scale * r);
                    particles.push(new Particle(centerX + innerPoint.x, centerY + innerPoint.y, textToDisplay));
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Адаптивність при зміні розміру вікна
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
