<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK ROMANCE // PERFORMANCE VERTICAL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            user-select: none;
            touch-action: none; /* Запобігає системним зумам на телефонах */
        }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #intro-screen {
            position: absolute;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Сувора прямокутна кнопка без заокруглень */
        #startBtn {
            display: none;
            padding: 20px 50px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffffff; 
            background: rgba(150, 0, 10, 0.08);
            border: 2px solid #ff0015;
            border-radius: 0px; 
            cursor: pointer; 
            box-shadow: 0 0 20px rgba(255, 0, 21, 0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 30; 
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0;
            margin-top: 260px; /* Чітко під рукояткою встромленого меча */
        }
        
        /* Мобільні відступи для кнопки */
        @media (max-width: 768px) {
            #startBtn {
                padding: 16px 40px;
                font-size: 0.9rem;
                margin-top: 200px; /* Трохи вище на малих екранах */
            }
        }
    </style>
</head>
<body>

    <canvas id="mainCanvas"></canvas>
    
    <div id="intro-screen">
        <button id="startBtn">Open Your Heart</button>
    </div>

    <audio id="bgMusic" src="angel.mp3" loop preload="auto"></audio>
    <img id="heartImg" src="heart.jpg" style="display: none;" crossorigin="anonymous">

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const introScreen = document.getElementById('intro-screen');
        const audio = document.getElementById('bgMusic');
        const heartImg = document.getElementById('heartImg');

        // Базове налаштування екрана
        let isMobile = window.innerWidth < 768;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const audioWaves = [];
        const textToDisplay = "love you";
        
        let audioCtx, analyser, dataArray, animationFrameId;
        let beatScale = 1; 
        let bassPower = 0;
        let isPlaying = false;
        
        // Координати центру екрана
        let centerX = canvas.width / 2;
        let centerY = canvas.height / 2;
        
        // Вертикальний меч (падає строго згори вниз за координатами X)
        let swordX = centerX;
        let swordY = -250;
        let targetSwordY = centerY - 30;
        
        let swordIn = false;
        let sparkParticles = [];
        let textAlpha = 0; 

        // Налаштування тач/мишки
        const mouse = { x: null, y: null, radius: isMobile ? 50 : 65 };
        
        const updateMouse = (x, y) => { mouse.x = x; mouse.y = y; };
        const resetMouse = () => { mouse.x = null; mouse.y = null; };
        
        window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
        window.addEventListener('mouseout', resetMouse);
        window.addEventListener('touchmove', (e) => updateMouse(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', resetMouse);

        class Particle {
            constructor(x, y, text, color) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseX = x; 
                this.baseY = y; 
                this.text = text;
                this.density = (Math.random() * 8) + 12;
                // На мобільних шрифт робимо трішки меншим, щоб судини не зливалися
                this.fontSize = ((Math.random() * 3 + (isMobile ? 7 : 8))) | 0;
                this.color = color;
                this.flash = 0;
            }

            draw() {
                let finalColor = this.color;

                if (mouse.x !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let rSq = isMobile ? 2500 : 4225; // 50^2 або 65^2
                    if (dx*dx + dy*dy < rSq) { 
                        this.flash = 12;
                    }
                }

                if (this.flash > 0) {
                    finalColor = `rgba(255, 200, 200, 0.8)`; 
                    ctx.shadowBlur = this.flash;
                    ctx.shadowColor = '#ff3355';
                    this.flash -= 0.8;
                } else if (bassPower > 0.4) {
                    ctx.shadowBlur = (8 * bassPower) | 0;
                    ctx.shadowColor = '#ff0033';
                }

                ctx.fillStyle = finalColor;
                ctx.font = `bold ${this.fontSize}px Arial`; 
                ctx.fillText(this.text, this.x | 0, this.y | 0);
                ctx.shadowBlur = 0;
            }

            update(centerX, centerY) {
                let targetX = centerX + (this.baseX - centerX) * beatScale;
                let targetY = centerY + (this.baseY - centerY) * beatScale;

                this.x -= (this.x - targetX) / this.density;
                this.y -= (this.y - targetY) / this.density;
            }
        }

        function scanHeartImage() {
            particles.length = 0;
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            // На мобільних скануємо матрицю меншого розміру для супер-оптимізації процесора
            const scanSize = isMobile ? 450 : 600; 
            tempCanvas.width = scanSize;
            tempCanvas.height = scanSize;
            
            tempCtx.drawImage(heartImg, 0, 0, scanSize, scanSize);
            const imgData = tempCtx.getImageData(0, 0, scanSize, scanSize).data;
            
            // Адаптивний коефіцієнт масштабу під розмір екрана смартфона/ПК
            const scale = Math.min(canvas.width, canvas.height) / scanSize * (isMobile ? 0.85 : 0.95);
            // Крок сканування: 5 для телефонів (менше точок), 4 для ПК (вища щільність)
            const step = isMobile ? 5 : 4; 

            for (let y = 0; y < scanSize; y += step) {
                for (let x = 0; x < scanSize; x += step) {
                    const index = (y * scanSize + x) * 4;
                    const r = imgData[index];
                    const g = imgData[index + 1];
                    const b = imgData[index + 2];
                    
                    if (r > 35 && r > g * 1.25 && r > b * 1.25) {
                        const posX = centerX + (x - scanSize / 2) * scale;
                        const posY = centerY + (y - scanSize / 2) * scale * 1.25;
                        const colorString = `rgb(${r},${Math.max(0, g-25)},${Math.max(0, b-25)})`;
                        particles.push(new Particle(posX, posY, textToDisplay, colorString));
                    }
                }
            }
        }

        function drawAdvancedText(centerX, centerY, scaleFactor = 1, currentAlpha = 1) {
            ctx.save();
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';
            ctx.globalAlpha = currentAlpha;
            
            // Мобільний розмір тексту трохи менший
            let baseFontSize = isMobile ? 36 : 46;
            let size = Math.floor(baseFontSize * scaleFactor);
            
            if (isPlaying && bassPower > 0.5) {
                ctx.fillStyle = `rgba(255, 0, 50, ${bassPower * 0.35})`;
                ctx.font = `italic bold ${size + Math.floor(20 * bassPower)}px sans-serif`;
                ctx.shadowBlur = 25 * bassPower;
                ctx.shadowColor = '#ff0033';
                ctx.fillText('Love you.', centerX, centerY);
            }
            
            ctx.shadowBlur = (15 * scaleFactor) | 0;
            ctx.shadowColor = 'rgba(255, 0, 30, 0.8)';
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${size}px sans-serif`;
            ctx.letterSpacing = "2px"; 
            ctx.fillText('Love you.', centerX, centerY);
            ctx.restore();
        }

        // АВТОМАТИЧНА ЗАСТАВКА: ВЕРТИКАЛЬНИЙ ПАДІННЯ МЕЧА
        function drawVerticalSwordIntro() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // М'яка заміна силуету серця на фоні
            ctx.save(); ctx.globalAlpha = 0.03;
            let imgW = isMobile ? 220 : 300;
            let imgH = isMobile ? 260 : 360;
            ctx.drawImage(heartImg, centerX - imgW/2, centerY - imgH/2, imgW, imgH);
            ctx.restore();

            if (textAlpha < 1 && swordY < centerY - 150) {
                textAlpha += 0.03;
            }

            drawAdvancedText(centerX, centerY, 1, textAlpha);

            // Падіння строго вертикально вниз
            if (swordY < targetSwordY) {
                swordY += 15; // Швидке солідне падіння
            } else if (!swordIn) {
                swordIn = true;
                // Спалах іскр від зіткнення
                let sparkCount = isMobile ? 25 : 50;
                for(let i = 0; i < sparkCount; i++) {
                    sparkParticles.push({
                        x: centerX, y: centerY,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10 - 2,
                        size: Math.random() * 2.5 + 1,
                        alpha: 1
                    });
                }
                startBtn.style.display = 'block';
                setTimeout(() => { startBtn.style.opacity = '1'; }, 50);
            }

            // Рендеринг іскр
            ctx.save();
            ctx.shadowBlur = 10; ctx.shadowColor = '#ff0011';
            for(let i = sparkParticles.length - 1; i >= 0; i--) {
                let p = sparkParticles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.025;
                if(p.alpha <= 0) { sparkParticles.splice(i, 1); continue; }
                ctx.fillStyle = `rgba(255, 60, 60, ${p.alpha})`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.restore();

            // МАЛЮВАННЯ ВЕРТИКАЛЬНОГО МЕЧА
            ctx.save();
            // Масштабуємо сам меч на мобільних телефонах, щоб не перекривав весь екран
            let swordScale = isMobile ? 0.75 : 1;
            ctx.translate(centerX, swordY);
            ctx.scale(swordScale, swordScale);
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff0022';

            // Лезо
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(-3, -190, 6, 190);
            ctx.fillStyle = '#ff0033'; 
            ctx.fillRect(-5, -190, 2, 190);
            ctx.fillRect(3, -190, 2, 190);

            // Хрестовина
            ctx.fillStyle = '#ff0022';
            ctx.fillRect(-35, -190, 70, 6);
            
            // Рукоятка
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-2, -225, 4, 35);
            ctx.fillRect(-6, -233, 12, 8);

            ctx.restore();

            if (swordIn && !isPlaying) {
                drawAdvancedText(centerX, centerY, 1, 0.85);
            }
        }

        function handleBackgroundWaves() {
            if (bassPower > 0.65 && Math.random() > 0.75) {
                audioWaves.push({ radius: 10, maxRadius: Math.min(canvas.width, canvas.height) * 0.85, opacity: 0.15 });
            }
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = 'rgba(200, 0, 15, 0.15)';
            for (let i = audioWaves.length - 1; i >= 0; i--) {
                let w = audioWaves[i];
                w.radius += 4 + (bassPower * 5); w.opacity -= 0.003; 
                if (w.opacity <= 0 || w.radius >= w.maxRadius) { audioWaves.splice(i, 1); continue; }
                ctx.beginPath(); ctx.arc(centerX, centerY, w.radius, 0, Math.PI * 2); ctx.stroke();
            }
        }

        function animate() {
            if (!swordIn || (swordIn && !isPlaying)) {
                drawVerticalSwordIntro();
            } else {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.22)'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (analyser) {
                    analyser.getByteFrequencyData(dataArray);
                    let bass = (dataArray[0] + dataArray[1] + dataArray[2]) / 3;
                    bassPower = bass / 255; 
                    beatScale = 1 + bassPower * 0.13; 
                }

                let gradient = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, Math.min(canvas.width, canvas.height) * 0.55);
                gradient.addColorStop(0, `rgba(55, 0, 5, ${bassPower * 0.15})`);
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                handleBackgroundWaves();

                const len = particles.length;
                for (let i = 0; i < len; i++) {
                    particles[i].update(centerX, centerY);
                    particles[i].draw();
                }

                drawAdvancedText(centerX, centerY, beatScale, 1);
            }

            animationFrameId = requestAnimationFrame(animate);
        }

        animate();

        startBtn.addEventListener('click', () => {
            introScreen.style.opacity = '0';
            setTimeout(() => { introScreen.style.display = 'none'; }, 1000);
            
            document.body.style.background = "radial-gradient(circle at center, #0e0002 0%, #030000 75%, #000000 100%)";

            audio.play().then(() => {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    let src = audioCtx.createMediaElementSource(audio);
                    analyser = audioCtx.createAnalyser();
                    src.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    analyser.fftSize = 64; 
                    analyser.smoothingTimeConstant = 0.75; 
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                }
            }).catch(e => console.log("Muted", e));

            isPlaying = true;
            scanHeartImage(); 
        });

        // ПІДТРИМКА ТРИ КЛІКИ / ТРИ ТАПИ НА ТЕЛЕФОНІ
        let clickCount = 0;
        let clickTimer;
        
        const handleTripleInput = (e) => {
            if (!isPlaying || e.target === startBtn) return;
            clickCount++;
            if (clickCount === 1) {
                clickTimer = setTimeout(() => { clickCount = 0; }, 400); 
            } else if (clickCount === 3) {
                clearTimeout(clickTimer);
                clickCount = 0;
                resetToStrictStart();
            }
        };

        window.addEventListener('click', handleTripleInput);

        function resetToStrictStart() {
            isPlaying = false;
            audio.pause();
            audio.currentTime = 0;
            audioWaves.length = 0;
            
            // Повне вертикальне скидання
            swordY = -250;
            swordIn = false;
            textAlpha = 0;
            sparkParticles = [];
            startBtn.style.display = 'none';
            startBtn.style.opacity = '0';

            document.body.style.background = "#000";
            introScreen.style.display = 'flex';
            setTimeout(() => { introScreen.style.opacity = '1'; }, 50);
        }

        window.addEventListener('resize', () => {
            isMobile = window.innerWidth < 768;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
            mouse.radius = isMobile ? 50 : 65;
            if(!swordIn) {
                swordX = centerX;
                swordY = -250;
            }
            targetSwordY = centerY - 30;
            if(isPlaying) scanHeartImage();
        });
    </script>
</body>
</html>
